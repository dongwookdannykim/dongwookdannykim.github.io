      - bullet: "**Stabilized Liminality: Air Defense Identification Zones and Authority without Territory.** Dissertation chapter in progress; future article manuscript."
      - bullet: "**When Claims Fail: The Bogota Declaration, the Australian Maritime Identification Zone, and the Limits of Authority without Territory.** Dissertation chapter in progress; future article manuscript."

