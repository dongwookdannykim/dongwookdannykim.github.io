    Dissertation and Book Project:
      - bullet: "**Authority without Territory: State Claims of Right in the Global Commons.** Asks why some state attempts to establish sovereignty-related authority over legally open global commons stabilize as accepted claims of right, while others fail."
      - bullet: "Argues such claims stabilize when three conditions interlock: accommodation by powers capable of disruption, resonance in legitimating vocabularies, and constructive ambiguity within a shared framework."
      - bullet: "Empirical chapters examine the exclusive economic zone, air defense identification zones, the Australian Maritime Identification Zone, and the Bogota Declaration."
      - bullet: "The book manuscript adds a polar/Arctic chapter extending the argument to climate-driven and infrastructural transformations of the global commons."

    Job Market Papers and Manuscripts in Preparation:
