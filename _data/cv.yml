          - "Dissertation: *Authority without Territory: State Claims of Right in the Global Commons.* Co-advisors: Mark Bell and Ron Krebs."
          - "Geospatial Skills Certificate; completed coursework for the graduate minor in Geographic Information Science (GIS)."
          - "M.A. in Political Science, 2024."
