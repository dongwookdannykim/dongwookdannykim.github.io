  location: Minneapolis, MN
  image: ""
  summary: >
    I study how states create, justify, and stabilize claims of right over
    legally open global commons. My dissertation and first-book project,
    "Authority without Territory: State Claims of Right in the Global Commons,"
    asks why some such claims stabilize into accepted rights while others fail.
    My work draws on historical, legal, policy, and multi-method evidence, with
    methodological training spanning qualitative, quantitative, formal,
    geospatial, and computational approaches.
