cv:
  name: Dongwook Kim
  location: Minneapolis, MN
  email: kim01159@umn.edu
  label: Ph.D. Candidate in Political Science
  summary: I study how states create, justify, and stabilize claims of right over legally open global commons. My dissertation and first-book project, "Authority without Territory," asks why some such claims stabilize into accepted rights while others fail. My work draws on historical, legal, policy, and multi-method evidence.

